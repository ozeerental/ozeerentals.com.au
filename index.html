<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ozee Rentals — Your Drive, Your Way</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #D72638; --red-dark: #A81D2A; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: Barlow, sans-serif; }

    .hero {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.08) 0%,
        rgba(0,0,0,0.10) 35%,
        rgba(0,0,0,0.52) 65%,
        rgba(0,0,0,0.72) 100%
      );
      z-index: 1;
    }

    /* NAVBAR — top */
    .navbar {
      position: relative; z-index: 10;
      display: flex; justify-content: center;
      padding: 18px 40px;
      animation: fadeDown 0.8s ease both;
    }
    .logo-pill {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 60px;
      padding: 8px 24px 8px 12px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: var(--red); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 20px; height: 20px; fill: white; }
    .logo-text {
      font-family: "Bebas Neue", sans-serif;
      font-size: 22px; letter-spacing: 3px; color: #fff;
    }
    .logo-text em { color: var(--red); font-style: normal; }

    /* MAIN — flex-grow to fill middle space */
    .main {
      position: relative; z-index: 5;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 24px;
      gap: 14px;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 40px; padding: 5px 18px;
      color: #fff; font-size: 11px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      backdrop-filter: blur(10px);
      animation: fadeUp 0.9s 0.2s ease both;
    }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(215,38,56,0.6); }
      50%      { box-shadow: 0 0 0 6px rgba(215,38,56,0); }
    }

    .headline {
      text-align: center; line-height: 0.92;
      animation: fadeUp 0.9s 0.3s ease both;
    }
    .headline h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(48px, 8.5vw, 108px);
      color: #fff; letter-spacing: 2px;
      text-shadow: 0 2px 30px rgba(0,0,0,0.4);
    }
    .headline h1 span { color: var(--red); display: block; }

    .tagline {
      max-width: 480px; text-align: center;
      padding: 14px 26px;
      background: rgba(10,10,10,0.52);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.88);
      font-size: 14px; line-height: 1.6;
      animation: fadeUp 0.9s 0.45s ease both;
    }

    .contacts {
      display: flex; gap: 12px;
      flex-wrap: wrap; justify-content: center;
      animation: fadeUp 0.9s 0.6s ease both;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 12px 22px; border-radius: 50px;
      font-family: Barlow, sans-serif;
      font-weight: 600; font-size: 14px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.35); }
    .btn-red { background: var(--red); color: #fff; border: none; }
    .btn-red:hover { background: var(--red-dark); }
    .btn-ghost {
      background: rgba(255,255,255,0.12); color: #fff;
      border: 1px solid rgba(255,255,255,0.30);
      backdrop-filter: blur(10px);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.22); }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* FOOTER — sits naturally below contacts, inside .main */
    .footer {
      position: relative; z-index: 10;
      text-align: center;
      padding: 10px 16px 14px;
      color: rgba(255,255,255,0.40);
      font-size: 12px; letter-spacing: 0.4px;
      animation: fadeUp 0.9s 0.75s ease both;
    }
    .footer a { color: rgba(255,255,255,0.50); text-decoration: none; }
    .footer a:hover { color: #fff; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
